services:
  - type: web
    name: salesiq-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: LLM_PROVIDER
        value: mock          # Change to openai or claude when ready
      - key: OPENAI_API_KEY
        sync: false          # Set this in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false          # Set this in Render dashboard
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: CHROMA_DIR
        value: /data/chroma_db
      - key: CORS_ORIGINS
        value: "*"           # After deploying on Vercel, replace * with your Vercel URL
    disk:
      name: salesiq-data
      mountPath: /data
      sizeGB: 1
